{% extends "base.html" %}

{% block title %}Login - ShopSphere{% endblock %}

{% block extra_css %}
<style>
    .auth-section {
        min-height: 70vh;
        padding: 70px 0;
    }
</style>
{% endblock %}

{% block content %}
    <section class="auth-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-7">
                    <div class="content-card p-4">
                        <div class="text-center mb-4">
                            <span class="icon-tile mb-3">
                                <i class="fa-solid fa-user-lock"></i>
                            </span>
                            <h2 class="fw-bold">Login</h2>
                            <p class="text-muted mb-0">Access your ShopSphere account.</p>
                        </div>

                        {% if error or msg %}
                        <div class="alert alert-danger">
                            {{ error|default:msg }}
                        </div>
                        {% endif %}

                        <form method="POST">
                            {% csrf_token %}

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email"
                                    class="form-control"
                                    name="email"
                                    placeholder="Enter email">
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">Password</label>
                                <input type="password"
                                    class="form-control"
                                    name="password"
                                    placeholder="Enter password">
                            </div>

                            <button class="btn btn-brand btn-lg w-100">
                                Login
                            </button>
                        </form>

                        <p class="text-center text-muted mt-4 mb-0">
                            New to ShopSphere?
                            <a href="/register/" class="fw-bold text-decoration-none">Create account</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
